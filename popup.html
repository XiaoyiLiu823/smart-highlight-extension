<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Smart Highlighter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 340px;
      padding: 12px;
      box-sizing: border-box;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    h3 {
      margin: 12px 0 8px;
      font-size: 14px;
    }

    label {
      display: block;
      margin: 10px 0 4px;
      font-size: 13px;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      box-sizing: border-box;
      padding: 8px;
      font-size: 13px;
    }

    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      font-size: 13px;
    }

    .hint {
      color: #666;
      font-size: 12px;
      margin-top: 4px;
      line-height: 1.4;
    }

    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      flex: 1;
      padding: 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #2f6f3e;
      min-height: 18px;
      line-height: 1.4;
    }

    #freqList {
      max-height: 220px;
      overflow-y: auto;
      font-size: 13px;
      border-top: 1px solid #eee;
      padding-top: 4px;
    }

    .freq-item {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
    }

    .freq-text {
      word-break: break-word;
      flex: 1;
    }

    .freq-count {
      font-weight: 700;
      flex-shrink: 0;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 10px;
      border: 1px solid #eee;
      border-radius: 8px;
    }

    .toggle-row input[type="checkbox"] {
      margin: 0;
      transform: scale(1.1);
    }

    .toggle-text {
      font-size: 13px;
      font-weight: 600;
    }

    .toggle-desc {
      color: #666;
      font-size: 12px;
      margin-top: 4px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h2>关键词高亮</h2>

  <label for="keywords">关键词列表</label>
  <textarea id="keywords" placeholder="每行一个关键词，例如：
内容策略
模型
Chrome
highlight"></textarea>
  <div class="hint">支持中文和英文。建议每行一个词或短语。</div>

  <label for="manualThreshold">x：关键词深绿色阈值</label>
  <input id="manualThreshold" type="number" min="1" value="3" />

  <label for="autoThreshold">y：非关键词黄色阈值</label>
  <input id="autoThreshold" type="number" min="1" value="5" />

  <label for="sortThreshold">词频排序阈值 n</label>
  <input id="sortThreshold" type="number" min="1" value="30" />
  <div class="hint">显示出现次数大于等于 n 的词，并按频次降序排列。</div>

  <label for="colorStep">黄色分档步长</label>
  <input id="colorStep" type="number" min="1" value="30" />
  <div class="hint">自动高频词每多这么多次，颜色加深一档。</div>

  <label for="excludeKeywords">排除词列表</label>
  <textarea id="excludeKeywords" placeholder="每行一个不想高亮的词，例如：
the
said
people
这个
但是"></textarea>
  <div class="hint">这些词将不会被高亮，优先级高于其他规则。</div>

  <div class="toggle-row">
    <input id="sessionAutoRun" type="checkbox" />
    <div>
      <div class="toggle-text">会话内自动高亮</div>
      <div class="toggle-desc">开启后，本次浏览器会话里新打开的网页会自动套用当前参数；关闭浏览器后失效。</div>
    </div>
  </div>

  <div class="buttons">
    <button id="saveAndRun">保存并高亮</button>
    <button id="clearHighlight">清除高亮</button>
  </div>

  <div class="status" id="status"></div>

  <hr />
  <h3>词频排序</h3>
  <div id="freqList">
    <div style="color:#666;">暂无结果</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
